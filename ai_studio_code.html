<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>하나님 나라 여권</title>
<!-- Firebase SDK 로드 -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* [기존 CSS 스타일은 동일하므로 생략합니다 - 그대로 유지하세요] */
  @font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');font-weight:400;font-display:swap;}
  @font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');font-weight:600;font-display:swap;}
  @font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');font-weight:800;font-display:swap;}
  :root{--navy:#16223F;--navy-deep:#0D1730;--gold:#C9A227;--gold-light:#E8CD7A;--cream:#F6F1E4;--card:#FFFDF6;--ink:#22314B;--ink-soft:#5B6478;--line:#DCD3B8;--team1:#A6342A;--team2:#2E6F55;--team3:#2B4C7E;--team4:#8B5E22;}
  *{box-sizing:border-box;}h1,h3{font-weight:600;}body{margin:0; background:#DAD5C6; font-family:'Noto Sans KR', sans-serif; color:var(--ink);}
  .toolbar{position:sticky; top:0; z-index:50; background:var(--navy-deep); color:var(--cream); padding:12px 20px; display:flex; gap:10px; align-items:center; font-size:14px; flex-wrap:wrap;}
  .toolbar b{font-family:'Paperlogy'; font-weight:600; letter-spacing:0.5px; font-size:15px; margin-right:8px;}
  .toolbar button{background:transparent; color:var(--cream); border:1px solid #4B5578; padding:8px 14px; border-radius:20px; cursor:pointer; font-size:13px; font-family:'Noto Sans KR';}
  .toolbar button.active{background:var(--gold); color:var(--navy-deep); border-color:var(--gold); font-weight:700;}
  .toolbar .spacer{flex:1;}.toolbar .print-btn{background:var(--team1); border-color:var(--team1); font-weight:700;}
  .admin-overview{max-width:980px; margin:28px auto; padding:0 18px;}
  .admin-overview h2{font-family:'Paperlogy'; color:var(--navy); font-size:24px; margin:0 0 8px;}
  .admin-overview p{margin:0 0 18px; color:var(--ink-soft); font-size:14px;}
  .admin-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
  .admin-card{background:var(--card); border:1px solid var(--line); border-top:6px solid var(--team-color); border-radius:8px; padding:18px;}
  .admin-card b{display:block; font-family:'Paperlogy'; font-size:18px; color:var(--navy);}
  .admin-card span{display:block; margin-top:9px; font-size:14px; color:var(--ink-soft);}
  .admin-card strong{font-family:'Paperlogy'; font-size:28px; color:var(--team-color);}
  .sheet{width:210mm; min-height:297mm; margin:24px auto; background:var(--cream); box-shadow:0 6px 24px rgba(0,0,0,0.25); position:relative; display:none; overflow:hidden;}
  .sheet.show{display:block;}.cover{background:none; padding:0; position:relative; overflow:hidden; min-height:0; display:block;}
  .main-banner{display:block; width:100%; height:auto;}.cover .swirl{position:absolute; inset:0; width:100%; height:100%;}
  .cover .content{position:relative; z-index:2; display:flex; flex-direction:column; align-items:center;}
  .emblem{width:74px; height:74px; flex:none; margin-bottom:14px;}
  .cover .kr-name{font-family:'Paperlogy'; font-weight:600; font-size:13px; letter-spacing:6px; color:var(--gold-light); margin:0 0 10px;}
  .cover h1{font-family:'Paperlogy'; font-weight:800; font-size:25px; margin:0 0 14px; color:#F3E7C4; letter-spacing:2px;}
  .cover .sub-en{font-family:'Paperlogy'; font-size:11px; letter-spacing:4px; color:var(--gold-light); text-transform:uppercase; margin:0; line-height:1.9;}
  .cover .chip-icon{width:26px; height:18px; margin-top:20px; opacity:0.9;}
  .below-cover{background:var(--navy-deep); padding:8px 16mm; display:flex; justify-content:space-between; align-items:center; border-bottom:6px solid var(--gold);}
  .below-cover .cover-num{font-size:10.5px; letter-spacing:1px; color:var(--gold-light); opacity:0.9;}
  .team-chip{font-family:'Paperlogy'; font-weight:600; font-size:14px; padding:5px 16px; border-radius:4px; color:#fff;}
  .team-chip span{display:inline; font-size:9px; font-family:'Noto Sans KR'; font-weight:500; letter-spacing:1px; opacity:0.9; margin-left:6px;}
  .body-pad{padding:14px 16mm 12mm;}
  .bio-page{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:12px 16px; margin-bottom:12px;}
  .bio-right h3{font-family:'Paperlogy'; font-size:13px; margin:0 0 6px; color:var(--navy); letter-spacing:0.5px;}
  .bio-grid{display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; font-size:11.5px;}
  .bio-grid div span{color:var(--ink-soft); font-size:9.5px; display:block; letter-spacing:0.5px;}
  .fill-line{border-bottom:1px dashed var(--ink-soft); display:inline-block; min-width:80px;}
  .members{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; align-items:center;}
  .member-slot{width:62px; height:24px; border:1px dashed var(--ink-soft); border-radius:4px; font-size:10px; color:var(--ink); text-align:center; background:transparent; font-family:'Noto Sans KR'; padding:0 4px;}
  .member-slot::placeholder{color:var(--line);}.member-slot:focus{outline:none; border-style:solid; border-color:var(--gold);}
  .member-add{width:24px; height:24px; border-radius:50%; border:1px dashed var(--ink-soft); background:transparent; color:var(--ink-soft); font-size:14px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;}
  .map-box{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px 16px 4px; margin-bottom:12px;}
  .map-box h3{font-family:'Paperlogy'; font-size:13px; margin:0 0 2px; color:var(--navy);}
  .map-box svg{display:block; width:100%; height:auto;}
  .rule-box{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px 16px; margin-bottom:12px;}
  .rule-box h3{font-family:'Paperlogy'; font-size:13px; margin:0 0 6px; color:var(--navy);}
  .rule-box p{font-size:11.5px; line-height:1.7; margin:0; color:var(--ink-soft);}
  .missions{display:flex; flex-direction:column; gap:8px;}
  .mission{display:flex; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:9px 14px; align-items:center; transition:background .3s, border-color .3s;}
  .mission.done{background:#FBF3E0; border-color:var(--gold);}
  .stamp-slot{flex:none; width:82px; height:82px; position:relative;}
  .stamp-slot input[type=file]{position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;}
  .stamp-slot label{display:block; position:relative; width:100%; height:100%; border-radius:50%; cursor:pointer; overflow:hidden; background:#fff;}
  .stamp-photo{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; filter:brightness(1.3) saturate(0.55) blur(0.6px); transition:opacity .25s;}
  .stamp-photo.show{opacity:0.42;}.stamp-guide{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border:1.5px dashed var(--line); border-radius:50%; color:var(--ink-soft); background:var(--card);}
  .stamp-guide svg{width:22px; height:22px; opacity:0.7;}.stamp-guide span{font-size:8px; line-height:1.2; text-align:center; padding:0 6px;}
  .stamp-ink{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;}
  .stamp-ink img{width:100%; height:100%; object-fit:contain; opacity:0; mix-blend-mode:multiply; transform:scale(2.2) rotate(-16deg);}
  .stamp-ink.animate img{animation:stampPress .5s cubic-bezier(.25,1.6,.4,1) forwards;}
  .stamp-ink.settled img{opacity:1; transform:scale(1) rotate(-8deg);}
  @keyframes stampPress{0%{opacity:0; transform:scale(2.2) rotate(-16deg);} 55%{opacity:1; transform:scale(0.82) rotate(-9deg);} 75%{transform:scale(1.1) rotate(-7deg);} 100%{opacity:1; transform:scale(1) rotate(-8deg);}}
  .m-stamp-wrap{flex:none; width:82px; height:82px;}
  .m-body{flex:1; min-width:0;}
  .m-body .m-title{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .m-body .m-title b{font-family:'Paperlogy'; font-weight:600; font-size:14.5px; color:var(--navy);}
  .m-body .m-title span{font-size:10px; color:var(--ink-soft);}
  .m-pose{font-family:'Gaegu'; font-weight:700; font-size:13px; color:var(--ink); margin-top:2px; line-height:1.35;}.m-pose::before{content:'\1F4F8  '; font-family:'Noto Sans KR';}
  .m-ref{flex:none; width:88px; height:88px; object-fit:cover; border-radius:8px; border:1px solid var(--line); cursor:pointer; transition:transform .15s;}
  .m-ref:hover{transform:scale(1.04);}.m-ref:active{transform:scale(0.97);}.m-ref-link{display:none;}
  .lightbox{position:fixed; inset:0; background:rgba(8,12,22,0.92); display:none; align-items:center; justify-content:center; z-index:300; padding:28px; cursor:zoom-out;}
  .lightbox.show{display:flex;}.lightbox img{max-width:100%; max-height:100%; border-radius:10px; box-shadow:0 14px 44px rgba(0,0,0,.55); cursor:default;}
  .lightbox-cap{position:absolute; bottom:28px; left:0; right:0; text-align:center; color:#EDEFF3; font-family:'Paperlogy'; font-size:13px; letter-spacing:0.5px;}
  .lightbox-close{position:absolute; top:18px; right:20px; width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.14); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer;}
  .m-sign{flex:none; width:60px; font-size:8.5px; color:var(--ink-soft); text-align:center;}
  .m-sign .check{width:26px; height:26px; margin:0 auto 3px; border-radius:50%; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--line); transition:all .3s;}
  .mission.done .m-sign .check{border-color:var(--gold); color:var(--gold); background:#FBF3E0;}
  .finish{margin-top:10px; background:#9AA0AC; color:#fff; border-radius:8px; padding:14px 18px; display:flex; gap:14px; align-items:center; border-left:6px solid #7C828E; transition:background .5s, border-color .5s;}
  .finish.unlocked{background:var(--navy); border-left-color:var(--gold); animation:unlockPop .6s ease;}
  @keyframes unlockPop{0%{transform:scale(0.97);} 40%{transform:scale(1.02);} 100%{transform:scale(1);}}
  .finish .fnum{flex:none; width:44px; height:44px; border-radius:50%; background:#7C828E; display:flex; align-items:center; justify-content:center; font-family:'Paperlogy'; font-weight:900; font-size:18px; color:#fff; transition:background .5s;}
  .finish.unlocked .fnum{background:var(--gold); color:var(--navy-deep);}
  .finish h3{font-family:'Paperlogy'; font-size:14px; margin:0 0 4px;}
  .finish p{font-size:11px; line-height:1.65; margin:0; color:#EDEFF3;}.finish.unlocked p{color:#D9DFEE;}
  .foot-note{margin-top:8px; font-size:9px; color:var(--ink-soft); text-align:center;}
  @media screen and (max-width:600px){.toolbar{padding:10px 12px; gap:6px;}.toolbar b{width:100%; margin-right:0;}.toolbar button{padding:8px 12px;}.sheet{width:100%; min-height:0; margin:0; box-shadow:none;}.cover{padding:0; min-height:0;}.cover h1{font-size:19px;}.emblem{width:58px; height:58px;}.below-cover{flex-direction:column; gap:6px; align-items:flex-start; padding:10px 16px;}.team-chip{align-self:flex-start;}.body-pad{padding:12px 6px 20px;}.bio-grid{grid-template-columns:1fr;}.mission{position:relative; flex-wrap:nowrap; gap:10px; padding:13px 12px 15px; align-items:flex-start;}.stamp-slot{position:static; width:60px; height:60px;}.m-body{display:block; width:auto; flex:1; min-width:0;}.m-body .m-title{width:auto; min-height:0; margin-left:0; gap:5px; align-content:normal;}.m-body .m-title b{font-size:15px;}.m-body .m-title span{font-size:10.5px;}.m-pose{width:auto; font-size:12.5px; line-height:1.5; letter-spacing:-0.15px; margin-top:4px;}.m-ref{display:none;}.m-ref-link{display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:10px; padding:2px 6px; background:transparent; color:var(--ink-soft); font:500 9px 'Noto Sans KR'; cursor:pointer;}.m-sign{display:none;}.finish{flex-direction:column; align-items:flex-start;}.admin-overview{margin:18px auto; padding:0 12px;}.admin-overview h2{font-size:20px;}.admin-grid{grid-template-columns:1fr 1fr; gap:8px;}.admin-card{padding:14px;}}
  @media print{body{background:#fff;}.toolbar{display:none;}.sheet{display:block !important; box-shadow:none; margin:0; page-break-after:always; width:210mm; min-height:297mm;}.sheet:last-child{page-break-after:auto;}}
</style>
</head>
<body>

<div class="toolbar">
  <b>살아가요, 하나님 나라</b>
  <div class="spacer"></div>
  <button data-t="0" class="tabbtn active">1조</button>
  <button data-t="1" class="tabbtn">2조</button>
  <button data-t="2" class="tabbtn">3조</button>
  <button data-t="3" class="tabbtn">4조</button>
</div>

<div id="sheets"></div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-close">✕</div>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-cap" id="lightbox-cap"></div>
</div>

<script type="module">
  // Firebase SDK 임포트
  import { initializeApp } from "firebase/app";
  import { getFirestore, doc, setDoc, onSnapshot, collection } from "firebase/firestore";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";

  // 사용자 제공 Firebase 설정
  const firebaseConfig = {
    apiKey: "AIzaSyAmacXwQ8mKABNZv-AR0i3iJzMToyNdUOQ",
    authDomain: "nongdari-73d22.firebaseapp.com",
    databaseURL: "https://nongdari-73d22-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "nongdari-73d22",
    storageBucket: "nongdari-73d22.firebasestorage.app",
    messagingSenderId: "947854597856",
    appId: "1:947854597856:web:5eec1e5967e843a6047a85"
  };

  // Firebase 초기화
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  const teamColors = ['#A6342A','#2E6F55','#2B4C7E','#8B5E22'];
  const teamNames = ['1조','2조','3조','4조'];
  const progress = {0:new Set(),1:new Set(),2:new Set(),3:new Set()};

  const stations = [
    {name:'농다리', sub:'천년의 돌다리를 건너다', pose:'팀원 한 명의 신발을 벗어 카메라 가까이에 크게 들고, 나머지 팀원들은 저 멀리서 그 신발 안에 쏙 들어간 것처럼 보이게 서서 찰칵 (원근법 트릭샷)', ref: 'https://cdn.pixabay.com/photo/2016/11/19/11/33/foot-1838767_1280.jpg'},
    {name:'용고개 성황당', sub:'전설이 깃든 서낭당', pose:'한 명은 카메라 가까이에서 가방을 멘 듯 몸을 틀어 서고, 나머지 팀원들은 멀리서 그 가방 위에 올라탄 것처럼 보이게 서기 (원근법 트릭샷)', ref: 'https://cdn.pixabay.com/photo/2016/11/19/22/52/backpack-1841544_1280.jpg'},
    {name:'황토 맨발숲길', sub:'맨발로 걷는 흙길', pose:'한 명은 카메라 가까이에서 입을 크게 벌리고, 나머지 팀원들은 숲길을 따라 한 줄로 서서 그 입 속으로 빨려 들어가는 표정과 자세로 찰칵', ref: 'https://cdn.pixabay.com/photo/2017/04/05/01/16/food-2203732_1280.jpg'},
    {name:'흔들다리 (하늘다리)', sub:'초평호 위 구름다리를 건너다', pose:'한 명은 카메라 가까이에서 입으로 바람을 부는 포즈, 나머지 팀원들은 다리 위에 도미노처럼 한 줄로 서서 바람에 날아가듯 쓰러지는 포즈', ref: 'https://cdn.pixabay.com/photo/2016/08/11/23/48/mountains-1587287_1280.jpg'},
    {name:'닭 소원돌탑', sub:'닭이 앉은 돌탑', pose:'돌탑 앞 바닥에 팀원 전체가 머리를 안쪽으로 모아 둥글게 눕고, 손을 맞잡아 십자가(별) 모양 만들기 - 한 명이 위에서 내려찍기', ref: 'https://cdn.pixabay.com/photo/2016/03/31/19/25/cross-1294975_1280.jpg'}
  ];

  function rotate(arr, n){ return arr.slice(n).concat(arr.slice(0,n)); }

  function miniMap(order, color){
    const w = 700, h = 140; const n = order.length; const marginX = 66;
    const stepX = (w - marginX*2) / (n+1); let pts = [];
    pts.push({x:marginX - 36, y:h/2, label:'출발', sub:'주차장'});
    for(let i=0;i<n;i++){
      const x = marginX + stepX*(i+1); const y = h/2 + (i%2===0 ? -26 : 26);
      pts.push({x, y, label: order[i].seq, sub: order[i].name});
    }
    pts.push({x:w - marginX + 36, y:h/2, label:'\uB3C4\uCC29', sub:'비밀 목적지'});
    let path = 'M ' + pts.map(p=>p.x+' '+p.y).join(' L ');
    let dots = '';
    pts.forEach((p,i)=>{
      const isEnd = (i===0 || i===pts.length-1);
      const r = isEnd ? 15 : 19; const fill = isEnd ? '#6B7280' : color;
      dots += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${fill}" stroke="#F6F1E4" stroke-width="3"/>`;
      dots += `<text x="${p.x}" y="${p.y+5}" text-anchor="middle" font-family="Paperlogy" font-weight="700" font-size="${isEnd?10:15}" fill="#fff">${p.label}</text>`;
      dots += `<text x="${p.x}" y="${p.y + (p.y > h/2 ? 32 : -26)}" text-anchor="middle" font-family="Noto Sans KR" font-size="10" font-weight="700" fill="#22314B">${p.sub}</text>`;
    });
    return `<svg viewBox="0 0 ${w} ${h}"><path d="${path}" fill="none" stroke="#DCD3B8" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 13"/>${dots}</svg>`;
  }

  function buildSheet(teamIdx){
    const color = teamColors[teamIdx];
    const order = rotate(stations, teamIdx).map((s,i)=>({...s, seq:i+1}));
    const missionsHtml = order.map((s,i) => {
      const uid = teamIdx+'_'+i;
      return `
      <div class="mission" id="mission-${uid}">
        <div class="stamp-slot">
          <label>
            <img class="stamp-photo" id="photo-${uid}" alt="">
            <div class="stamp-guide" id="guide-${uid}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.4"/></svg>
              <span>사진 업로드</span>
            </div>
            <div class="stamp-ink" id="ink-${uid}"><img src="https://i.imgur.com/8Q8W8r9.png" alt="스탬프"></div>
            <input type="file" accept="image/*" class="file-input" data-uid="${uid}" data-team="${teamIdx}">
          </label>
        </div>
        <div class="m-body">
          <div class="m-title"><b>${s.name}</b><span>${s.sub}</span><button type="button" class="m-ref-link" data-src="${s.ref}" data-name="${s.name}">예시 보기</button></div>
          <div class="m-pose">${s.pose}</div>
        </div>
        <img class="m-ref" src="${s.ref}" alt="예시" data-src="${s.ref}" data-name="${s.name}">
        <div class="m-sign"><div class="check" id="check-${uid}">✓</div>완료</div>
      </div>`;}).join('');

    return `
    <div class="sheet" id="sheet-${teamIdx}">
      <div class="cover"><img class="main-banner" src="https://i.imgur.com/KxS6D6H.png" alt="메인 배너"></div>
      <div class="below-cover">
        <div class="cover-num">PASSPORT No. GK-2026-${String(teamIdx+1).padStart(4,'0')}</div>
        <div class="team-chip" style="background:${color}">${teamNames[teamIdx]}<span>TRAVEL PARTY</span></div>
      </div>
      <div class="body-pad">
        <div class="bio-page">
          <h3>TRAVELER INFORMATION · 여행자 정보</h3>
          <div class="bio-grid">
            <div>국적<span>NATIONALITY</span><div class="fill-line">하나님 나라</div></div>
            <div>조<span>PARTY</span><div class="fill-line">${teamNames[teamIdx]}</div></div>
            <div>목적지<span>DESTINATION</span><div class="fill-line">농다리 · 진천 미르숲</div></div>
            <div>여행일<span>DATE</span><div class="fill-line">2025. 05. 24</div></div>
          </div>
          <div class="members" id="members-${teamIdx}">
            <input class="member-slot" placeholder="이름1">
            <input class="member-slot" placeholder="이름2">
            <button type="button" class="member-add" data-team="${teamIdx}">+</button>
          </div>
        </div>
        <div class="map-box"><h3>ROUTE STAMP · 이동 경로</h3>${miniMap(order, color)}</div>
        <div class="rule-box"><h3>ENTRY MISSION · 입국 미션</h3><p>1. 지점 도착 후 팀 포즈 촬영<br>2. 사진 업로드 시 자동 도장 날인<br>3. 5개 수집 시 공연장 안내 오픈</p></div>
        <div class="missions">${missionsHtml}</div>
        <div class="finish" id="finish-${teamIdx}">
          <div class="fnum" id="finish-num-${teamIdx}">🔒</div>
          <div><h3 id="finish-title-${teamIdx}">최종 목적지 잠금 중</h3><p id="finish-msg-${teamIdx}">5개의 도장을 모으세요. (<span id="progress-${teamIdx}">0/5</span>)</p></div>
        </div>
      </div>
    </div>`;
  }

  // 전역 함수 설정을 모듈 방식으로 변경 (이벤트 위임 사용)
  document.addEventListener('change', async (e) => {
    if(e.target.classList.contains('file-input')) {
      const file = e.target.files[0];
      const { uid, team } = e.target.dataset;
      if(!file) return;

      // 1. Storage 업로드
      const storageRef = ref(storage, `photos/team${team}/${uid}_${Date.now()}`);
      const uploadTask = await uploadBytes(storageRef, file);
      const downloadURL = await getDownloadURL(uploadTask.ref);

      // 2. Firestore 업데이트
      const teamDoc = doc(db, "teams", `team${team}`);
      await setDoc(teamDoc, {
        [uid]: {
          photoUrl: downloadURL,
          completed: true,
          timestamp: new Date().toISOString()
        }
      }, { merge: true });
    }
  });

  function updateUI(teamIdx, uid, photoUrl) {
    const photo = document.getElementById('photo-' + uid);
    if(photo) {
      photo.src = photoUrl;
      photo.classList.add('show');
      const guide = document.getElementById('guide-' + uid);
      if(guide) guide.style.display = 'none';
      const ink = document.getElementById('ink-' + uid);
      if(ink) ink.classList.add('settled');
      const mission = document.getElementById('mission-' + uid);
      if(mission) mission.classList.add('done');
      
      progress[teamIdx].add(uid);
      updateFinish(teamIdx);
    }
  }

  function updateFinish(teamIdx){
    const n = progress[teamIdx].size;
    const box = document.getElementById('finish-'+teamIdx);
    if(!box) return;
    const num = document.getElementById('finish-num-'+teamIdx);
    const title = document.getElementById('finish-title-'+teamIdx);
    const msg = document.getElementById('finish-msg-'+teamIdx);
    const p = document.getElementById('progress-'+teamIdx);
    
    if(p) p.textContent = n+'/5 완료';
    if(n >= 5){
      box.classList.add('unlocked');
      num.textContent = '★';
      title.textContent = '공연장으로 이동하세요';
      msg.innerHTML = '🎉 모든 미션 완료! <b>공연장</b>으로 오세요.';
    }
    
    // 관리자 페이지 업데이트
    const adminEl = document.getElementById(`admin-progress-${teamIdx}`);
    if(adminEl) adminEl.textContent = `${n} / 5`;
  }

  // 초기화 및 실시간 리스너
  const route = location.hash.replace('#','');
  const isAdmin = route === 'admin';
  const selectedTeam = route.match(/^team=([1-4])$/) ? Number(route.match(/^team=([1-4])$/)[1]) - 1 : 0;

  const sheetsEl = document.getElementById('sheets');
  if(isAdmin) sheetsEl.insertAdjacentHTML('beforebegin', `<section class="admin-overview"><h2>전체 조 현황</h2><div class="admin-grid">${[0,1,2,3].map(i=>`<div class="admin-card" style="--team-color:${teamColors[i]}"><b>${teamNames[i]}</b><span>완료 미션</span><strong id="admin-progress-${i}">0 / 5</strong></div>`).join('')}</div></section>`);
  
  sheetsEl.innerHTML = [0,1,2,3].map(buildSheet).join('');
  if(!isAdmin) document.getElementById('sheet-'+selectedTeam).classList.add('show');

  // 실시간 동기화 리스너 등록
  [0,1,2,3].forEach(i => {
    onSnapshot(doc(db, "teams", `team${i}`), (doc) => {
      if(doc.exists()) {
        const data = doc.data();
        Object.entries(data).forEach(([uid, info]) => {
          if(info.completed) updateUI(i, uid, info.photoUrl);
        });
      }
    });
  });

  // UI 인터랙션 (Tab, Lightbox, AddMember)
  document.querySelectorAll('.tabbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('show'));
      document.getElementById('sheet-'+btn.dataset.t).classList.add('show');
    });
  });

  document.addEventListener('click', (e) => {
    if(e.target.dataset.src) {
      document.getElementById('lightbox-img').src = e.target.dataset.src;
      document.getElementById('lightbox-cap').textContent = e.target.dataset.name + ' 예시';
      document.getElementById('lightbox').classList.add('show');
    }
    if(e.target.classList.contains('lightbox-close') || e.target.id === 'lightbox') {
      document.getElementById('lightbox').classList.remove('show');
    }
    if(e.target.classList.contains('member-add')) {
      const teamIdx = e.target.dataset.team;
      const wrap = document.getElementById('members-'+teamIdx);
      const input = document.createElement('input');
      input.className = 'member-slot';
      input.placeholder = '추가이름';
      wrap.insertBefore(input, e.target);
    }
  });

</script>
</body>
</html>
