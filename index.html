<style>
/* [원본 CSS 100% 복구] */
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');font-weight:400;font-display:swap;}
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');font-weight:600;font-display:swap;}
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');font-weight:800;font-display:swap;}
:root{
  --navy:#16223F;--navy-deep:#0D1730;--gold:#C9A227;--gold-light:#E8CD7A;--cream:#F6F1E4;--card:#FFFDF6;--ink:#22314B;--ink-soft:#5B6478;--line:#DCD3B8;
  --team1:#A6342A;--team2:#2E6F55;--team3:#2B4C7E;--team4:#8B5E22;
}
*{box-sizing:border-box;}
body{margin:0; background:#DAD5C6; font-family:'Noto Sans KR', sans-serif; color:var(--ink);}

/* 첫 화면 (Gate) */
#gate{display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px; text-align:center;}
.gate-logo{width:100%; max-width:320px; margin-bottom:30px;}
.gate-buttons{display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:400px;}
.btn-admin-gate{grid-column: span 2; background:var(--navy-deep); color:#fff; border:none; padding:15px; border-radius:12px; font-weight:bold; cursor:pointer; margin-bottom:15px; font-family:'Paperlogy';}
.gate-btn{padding:20px; border:none; border-radius:12px; color:#fff; font-size:18px; font-weight:bold; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); font-family:'Paperlogy';}

/* 앱 화면 */
#app{display:none;}
.toolbar{position:sticky; top:0; z-index:50; background:var(--navy-deep); color:var(--cream); padding:12px 20px; display:flex; gap:10px; align-items:center; font-size:14px;}
.toolbar b{font-family:'Paperlogy'; font-weight:600; cursor:pointer;}
.admin-overview{max-width:980px; margin:28px auto; padding:0 18px;}
.admin-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
.admin-card{background:var(--card); border:1px solid var(--line); border-top:6px solid var(--team-color); border-radius:8px; padding:18px;}
.admin-photo-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:4px; margin-top:10px;}
.admin-photo-grid img{width:100%; aspect-ratio:1; object-fit:cover; border-radius:4px; background:#eee;}

/* 시트 스타일 */
.sheet{width:210mm; min-height:297mm; margin:24px auto; background:var(--cream); box-shadow:0 6px 24px rgba(0,0,0,0.25); display:none; overflow:hidden;}
.sheet.show{display:block;}
.main-banner{display:block; width:100%; height:auto;}
.below-cover{background:var(--navy-deep); padding:8px 16mm; display:flex; justify-content:space-between; align-items:center; border-bottom:6px solid var(--gold);}
.cover-num{font-size:10.5px; color:var(--gold-light);}
.team-chip{font-family:'Paperlogy'; font-weight:600; font-size:14px; padding:5px 16px; border-radius:4px; color:#fff;}
.body-pad{padding:14px 16mm 12mm;}
.bio-page{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:12px 16px; margin-bottom:12px;}
.bio-grid{display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; font-size:11.5px;}
.fill-line{border-bottom:1px dashed var(--ink-soft); display:inline-block; min-width:80px;}
.mission{display:flex; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:9px 14px; align-items:center; margin-bottom:10px;}
.mission.done{background:#FBF3E0; border-color:var(--gold);}
.stamp-slot{flex:none; width:82px; height:82px; position:relative;}
.stamp-slot label{display:block; width:100%; height:100%; border-radius:50%; cursor:pointer; overflow:hidden; background:#fff;}
.stamp-photo{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; filter:brightness(1.3) saturate(0.55) blur(0.6px); transition:opacity .25s;}
.stamp-photo.show{opacity:0.42;}
.stamp-ink{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;}
.stamp-ink img{width:100%; height:100%; object-fit:contain; opacity:0; mix-blend-mode:multiply;}
.mission.done .stamp-ink img{opacity:1; transform:rotate(-8deg);}
.m-body b{font-family:'Paperlogy'; font-weight:600; font-size:14.5px; color:var(--navy);}
.m-pose{font-family:'Gaegu'; font-weight:700; font-size:13px; color:var(--ink); margin-top:2px;}
.m-ref{flex:none; width:88px; height:88px; object-fit:cover; border-radius:8px; border:1px solid var(--line); cursor:pointer;}
.finish{margin-top:10px; background:#9AA0AC; color:#fff; border-radius:8px; padding:14px 18px; display:flex; gap:14px; align-items:center;}
.finish.unlocked{background:var(--navy); border-left:6px solid var(--gold);}

@media screen and (max-width:600px){
  .sheet{width:100%; margin:0; box-shadow:none;}
  .body-pad{padding:12px 10px 20px;}
  .m-ref{display:none;}
}
</style>

  <div class="gate-buttons">
    <button class="btn-admin-gate" onclick="goAdmin()">⚙️ 관리자 모드 접속</button>
    <button class="gate-btn" style="background:var(--team1)" onclick="goTeam(1)">1조</button>
    <button class="gate-btn" style="background:var(--team2)" onclick="goTeam(2)">2조</button>
    <button class="gate-btn" style="background:var(--team3)" onclick="goTeam(3)">3조</button>
    <button class="gate-btn" style="background:var(--team4)" onclick="goTeam(4)">4조</button>
  </div>
</div>

<div id="app">
  <div class="toolbar">
    <b onclick="location.href='#'">← 처음으로</b>
    <div style="flex:1; text-align:center;"><b id="toolbar-title">살아가요, 하나님 나라</b></div>
  </div>
  <div id="sheets"></div>
</div>

// 이미지 압축
async function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (e) => {
      const img = new Image();
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 300;
        const scaleSize = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scaleSize;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
    };
  });
}

window.goAdmin = () => { if(prompt("관리자 비밀번호를 입력하세요.") === "3212") { location.hash = "admin"; location.reload(); } };
window.goTeam = (t) => { location.hash = `team=${t}`; location.reload(); };

window.handleUpload = async function(input, tIdx, mIdx) {
  if(!input.files[0]) return;
  const label = input.parentElement; label.style.opacity = "0.5";
  const base64 = await compressImage(input.files[0]);
  await setDoc(doc(db, "teams", `team${tIdx}`), { [`m${mIdx}`]: base64 }, { merge: true });
  label.style.opacity = "1";
};

const route = location.hash.replace('#','');
const isAdmin = route === 'admin';
const tMatch = route.match(/team=([1-4])/);
const teamIdx = tMatch ? Number(tMatch[1])-1 : null;

if(isAdmin || teamIdx !== null) {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  let html = '';

  if(isAdmin) {
    html += `<div class="admin-overview"><h2>실시간 조별 현황</h2><div class="admin-grid">`;
    for(let i=0; i<4; i++) {
      html += `<div class="admin-card" style="--team-color:${teamColors[i]}"><b>${teamNames[i]}</b><div class="admin-photo-grid">${[0,1,2,3,4].map(m => `<img id="admin-img-${i}-${m}">`).join('')}</div><strong id="admin-count-${i}">0/5</strong></div>`;
    }
    html += `</div></div>`;
  }

  for(let i=0; i<4; i++) {
    html += `<div class="sheet ${i===teamIdx ? 'show':''}" id="sheet-${i}">
      <div class="cover"><img class="main-banner" src="assets/메인-배너.png" onerror="this.src='https://i.imgur.com/KxS6D6H.png'"></div>
      <div class="below-cover"><div class="cover-num">PASSPORT No. GK-2026-000${i+1}</div><div class="team-chip" style="background:${teamColors[i]}">${teamNames[i]}</div></div>

        <div class="bio-page"><div class="bio-grid"><div>국적<div class="fill-line">하나님 나라</div></div><div>조<div class="fill-line">${teamNames[i]}</div></div></div></div>
        <div class="missions">${stations.map((s, mIdx) => `
          <div class="mission" id="m-card-${i}-${mIdx}">
            <div class="stamp-slot">
              <label><img class="stamp-photo" id="photo-${i}-${mIdx}"><div style="text-align:center;font-size:9px;margin-top:30px;color:#999">사진클릭</div>
              <div class="stamp-ink"><img src="https://i.imgur.com/8Q8W8r9.png"></div>
              <input type="file" accept="image/*" style="display:none" onchange="handleUpload(this,${i},${mIdx})"></label>
            </div>
            <div class="m-body"><b>${s.name}</b><div class="m-pose">${s.pose}</div></div>
            <img class="m-ref" src="${s.ref}">
          </div>`).join('')}</div>
        <div class="finish" id="finish-${i}">🔒 미션을 완료하면 공연장 안내가 열립니다</div>
      </div>
    </div>`;
  }
  document.getElementById('sheets').innerHTML = html;

  // 실시간 동기화
  for(let i=0; i<4; i++){
    onSnapshot(doc(db, "teams", `team${i}`), (docSnap) => {
      if(!docSnap.exists()) return;
      const data = docSnap.data(); let count = 0;
      for(let m=0; m<5; m++) {
        if(data[`m${m}`]) {
          count++;
          const img = document.getElementById(`photo-${i}-${m}`); if(img){ img.src=data[`m${m}`]; img.classList.add('show'); }
          const card = document.getElementById(`m-card-${i}-${m}`); if(card) card.classList.add('done');
          const adminImg = document.getElementById(`admin-img-${i}-${m}`); if(adminImg) adminImg.src=data[`m${m}`];
        }
      }
      if(isAdmin) document.getElementById(`admin-count-${i}`).textContent = `${count}/5`;
      if(count>=5) { const f = document.getElementById(`finish-${i}`); if(f){ f.classList.add('unlocked'); f.innerHTML="★ 모든 미션 완료! 공연장으로 모여주세요! ★"; } }
    });
  }
}
